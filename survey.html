<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoo portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .survey-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: #696868;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            color: #ababab;
        }

        .survey-section {
            margin-bottom: 2.5rem;
            padding: 1.5rem;
            background:#262626;
            border-radius: 10px;
        }

        .rating-stars {
            display: flex;
            gap: 1rem;
            font-size: 1.5rem;
        }

        .rating-stars input { display: none; }
        .rating-stars label { cursor: pointer; color: #ddd; }
        .rating-stars input:checked ~ label { color: #ffd700; }
        .rating-stars label:hover { color: #ffd700; }
    </style>
</head>
<body>
    <div id="header">
        <div class="container">
            <nav>

            <img src="" alt="shoo">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Portifolio</a></li>
                <li><a href="contact.html">Contact Form</a></li>
                <li><a href="survey.html">Survey</a></li>
            </ul>
        </nav>
        <main class="survey-container">
            <h1>User Experience Survey</h1>
            <form id="surveyForm" onsubmit="return validateSurvey()">
                <div id="error-messages" class="error-box"></div>
    
                <section class="survey-section">
                    <h2>Personal Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Full Name:</label>
                            <input type="text" id="fullName" required>
                        </div>
                        <div class="form-group">
                            <label for="userEmail">Email:</label>
                            <input type="email" id="userEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="userAge">Age:</label>
                            <input type="number" id="userAge" min="13" max="100" required>
                        </div>
                        <div class="form-group">
                            <label for="userPhone">Phone:</label>
                            <input type="tel" id="userPhone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
                        </div>
                    </div>
                </section>
    
                <section class="survey-section">
                    <fieldset class="form-group">
                        <legend>Preferred Contact Method:</legend>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="contactPref" value="email" required>
                                Email
                            </label>
                            <label>
                                <input type="radio" name="contactPref" value="phone">
                                Phone
                            </label>
                            <label>
                                <input type="radio" name="contactPref" value="none">
                                No Preference
                            </label>
                        </div>
                    </fieldset>
    
                    <fieldset class="form-group">
                        <legend>Interests (Select all that apply):</legend>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" name="interests" value="web">
                                Web Development
                            </label>
                            <label>
                                <input type="checkbox" name="interests" value="mobile">
                                Mobile Development
                            </label>
                            <label>
                                <input type="checkbox" name="interests" value="design">
                                UI/UX Design
                            </label>
                        </div>
                    </fieldset>
                </section>
    
                <section class="survey-section">
                    <h2>Feedback</h2>

    
                    <div class="form-group">
                        <label for="comments">Additional Comments:</label>
                        <textarea id="comments" rows="5" placeholder="Your feedback is important to us..."></textarea>
                    </div>
                </section>
    
                <button type="submit" class="btn2">
                    Submit Survey
                </button>
            </form>
        </main>
    <footer>
        <p>&copy; 2025 Your Name. All rights reserved.</p>
    </footer>
</body>
</html>
